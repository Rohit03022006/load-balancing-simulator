apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: load-balancing-simulator-ns

spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: rohitxten/load-balancing-simulator-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: "http://backend-service:8080"